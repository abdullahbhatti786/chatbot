<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Deemcloud AI Assistant — Intelligent support for Deemcloud services." />
  <title>Deemcloud AI Assistant</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== Header ===== -->
  <header id="app-header">
    <div class="header-left">
      <div class="header-logo" id="header-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 12a4 4 0 0 0 8 0"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
      </div>
      <span class="header-title">Deemcloud <span class="header-title-accent">AI</span></span>
    </div>
    <div class="header-right">
      <span class="status-dot"></span>
      <span class="status-text">Online</span>

    </div>
  </header>

  <!-- ===== Main Chat Container ===== -->
  <main id="chat-container">

    <!-- Welcome Screen (shown initially) -->
    <div id="welcome-screen" class="welcome-screen">
      <div class="welcome-avatar">
        <div class="avatar-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="14" rx="3"/>
            <circle cx="9" cy="11" r="1.5"/>
            <circle cx="15" cy="11" r="1.5"/>
            <path d="M8 15h8"/>
            <line x1="9" y1="1" x2="9" y2="4"/>
            <line x1="15" y1="1" x2="15" y2="4"/>
          </svg>
        </div>
        <span class="avatar-online-dot"></span>
      </div>
      <h1 class="welcome-title">Deemcloud Assistant</h1>
      <p class="welcome-subtitle">Powered by <strong>Deemcloud</strong> — Ask me anything about our services, I'm ready to help.</p>

      <div class="suggestion-chips" id="suggestion-chips">
        <button class="chip" data-message="Tell me about your Cloud Services">
          <span class="chip-icon">☁️</span>
          <span>Tell me about your Cloud Services</span>
        </button>
        <button class="chip" data-message="What DevOps tools do you use?">
          <span class="chip-icon">⚙️</span>
          <span>What DevOps tools do you use?</span>
        </button>
        <button class="chip" data-message="How can I contact sales?">
          <span class="chip-icon">📞</span>
          <span>How can I contact sales?</span>
        </button>
      </div>
    </div>

    <!-- Chat Messages Area -->
    <div id="chat-messages" class="chat-messages"></div>

  </main>

  <!-- ===== Input Bar ===== -->
  <footer id="input-bar">
    <div class="input-wrapper">
      <div class="input-row">

        <textarea
          id="message-input"
          class="message-input"
          placeholder="Message Deemcloud Assistant..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="send-btn" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <div class="input-footer-left">

        </div>
        <div class="input-footer-right">
          <span class="shortcut-hint">⌘ + Enter to send</span>
        </div>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
